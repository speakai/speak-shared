name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  packages: write
  models: read

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [22]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Verify ESM import
        run: node -e "import('./dist/index.js').then(() => console.log('ESM OK')).catch(e => { console.error(e); process.exit(1) })"

      - name: Run tests
        run: npm test

  release:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Get commits since last release
        id: commits
        run: |
          LAST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            COMMIT_LOG=$(git log --oneline --no-decorate -50)
          else
            COMMIT_LOG=$(git log "${LAST_TAG}..HEAD" --oneline --no-decorate)
          fi

          if [ -z "$COMMIT_LOG" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new commits since last release."
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          CURRENT=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT" >> "$GITHUB_OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "log<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMIT_LOG" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

          echo "Commits since last release:"
          echo "$COMMIT_LOG"

      - name: Analyze changes with AI
        if: steps.commits.outputs.has_changes == 'true'
        id: ai
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          model: openai/gpt-4o-mini
          temperature: 0
          max-completion-tokens: 512
          system-prompt: |
            You are a release manager for an npm package. Analyze git commits and determine the semver bump type and write a changelog entry.

            Rules:
            - "fix:", bug fixes, typo fixes → patch
            - "feat:", new types, new enums, new interfaces → minor
            - "BREAKING CHANGE", removed types, renamed exports → major
            - "chore:", "docs:", "ci:", "refactor:" or any change you are unsure about → patch
            - Multiple changes: pick the highest bump level across all commits.
            - When unsure between patch and minor, choose patch.
            - Never respond with "none". Every release must bump at least a patch.

            You MUST respond in EXACTLY this format — two lines, no markdown, no extra text:
            bump: patch
            changelog: Added new MediaState enum values
          prompt: |
            Package: @speakai/shared (current version: ${{ steps.commits.outputs.current_version }})

            Commits since last release:
            ${{ steps.commits.outputs.log }}

      - name: Parse AI response and bump version
        if: steps.commits.outputs.has_changes == 'true'
        id: bump
        env:
          AI_RESPONSE: ${{ steps.ai.outputs.response }}
        run: |
          echo "AI response: $AI_RESPONSE"

          BUMP=$(echo "$AI_RESPONSE" | grep -oP 'bump:\s*\K\w+' | head -1)
          CHANGELOG=$(echo "$AI_RESPONSE" | grep -oP 'changelog:\s*\K.+' | head -1)

          echo "Detected bump: $BUMP"
          echo "Changelog: $CHANGELOG"

          # Never skip a release. If the AI returned none/empty/invalid — e.g. a
          # non-conventional commit message, or the AI step failed — fall back to
          # a patch bump so every push to main is published to npm.
          if [[ "$BUMP" != "patch" && "$BUMP" != "minor" && "$BUMP" != "major" ]]; then
            echo "Bump '$BUMP' is not usable — defaulting to patch."
            BUMP=patch
          fi
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Maintenance release"
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION"

          DATE=$(date +%Y-%m-%d)
          if [ -f CHANGELOG.md ]; then
            EXISTING=$(cat CHANGELOG.md)
            printf "# Changelog\n\n## %s (%s)\n\n- %s\n%s" \
              "$NEW_VERSION" "$DATE" "$CHANGELOG" \
              "$(echo "$EXISTING" | tail -n +2)" > CHANGELOG.md
          else
            printf "# Changelog\n\n## %s (%s)\n\n- %s\n" \
              "$NEW_VERSION" "$DATE" "$CHANGELOG" > CHANGELOG.md
          fi

      - name: Commit and tag release
        if: steps.bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag "${{ steps.bump.outputs.new_version }}"
          git push origin main --tags

      - name: Publish to npm
        if: steps.bump.outputs.should_release == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Mirror the same version to GitHub Packages so the voice-agent repos
      # (which scope @speakai -> npm.pkg.github.com for the private
      # voice-agent-shared) can resolve @speakai/shared from the same registry.
      # Runs AFTER the npm publish; only edits the working copy (never committed).
      - name: Publish to GitHub Packages
        if: steps.bump.outputs.should_release == 'true'
        run: |
          echo "@speakai:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" >> .npmrc
          npm pkg delete publishConfig.registry   # publishConfig forces npmjs; drop for this publish
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "$PKG@$VER already on GitHub Packages — skipping"
          else
            npm publish --registry=https://npm.pkg.github.com
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
